name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      GOPROXY: "https://proxy.golang.org,direct"
      GOSUMDB: "sum.golang.org"
      NODE_OPTIONS: ""
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Download Go modules
        run: go mod download

      - name: Download Lambda processor modules
        run: cd lambda/processor && go mod download && cd ../..

      - name: Run tests
        run: go test -v -coverprofile=coverage.out ./...

      - name: Run Lambda processor tests
        run: cd lambda/processor && go test -v -cover -coverprofile=coverage.out ./...

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.out
            lambda/processor/coverage.out

      - name: CDK Synth
        run: cdk synth
